<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Generate visual stegs from hidden strings." />
    <title>stegano.graphics</title>
  </head>
  <body>
    <canvas id="field" aria-hidden="true"></canvas>
    <main class="stage">
      <section class="workbench" aria-label="steg generator">
        <div class="render-shell">
          <div id="steg-output" class="steg-output" aria-live="polite"></div>
        </div>
        <form class="controls">
          <label class="phrase">
            <span>phrase</span>
            <textarea id="message" maxlength="180" spellcheck="false">mistrust authority</textarea>
            <span id="ignored-note" class="ignored-note" hidden>only letters a-z and spaces are encoded</span>
          </label>
          <label>
            <span>type</span>
            <select id="steg-type">
              <option value="fingerprint">fingerprint</option>
              <option value="spiral">spiral</option>
            </select>
          </label>
          <div class="control-row">
            <label>
              <span>line</span>
              <span class="color-control">
                <button class="color-trigger" id="foreground-trigger" type="button"></button>
                <span class="color-popover" id="foreground-popover" hidden>
                  <input id="foreground" type="color" value="#f5c266" />
                  <input id="foreground-alpha" type="range" min="0" max="1" step="0.01" value="1" />
                </span>
              </span>
            </label>
            <label>
              <span>ground</span>
              <span class="color-control">
                <button class="color-trigger" id="background-trigger" type="button"></button>
                <span class="color-popover" id="background-popover" hidden>
                  <input id="background" type="color" value="#050708" />
                  <input id="background-alpha" type="range" min="0" max="1" step="0.01" value="0" />
                </span>
              </span>
            </label>
            <button id="download-svg" type="button">SVG</button>
            <button id="download-png" type="button">PNG</button>
          </div>
        </form>
      </section>
    </main>
    <footer class="notes" aria-label="project notes">
      <span>
        made with love by
        <a href="https://ro8.in" rel="me noopener" target="_blank">RO8.IN</a>
      </span>
      <span>
        sponsored by
        <a href="https://tellers.ai" rel="noopener" target="_blank">tellers.ai</a>
      </span>
      <nav class="social" aria-label="social links">
        <a href="https://www.instagram.com/stegano.graphics/" rel="me noopener" target="_blank">instagram</a>
        <a href="https://github.com/yxdunc" rel="me noopener" target="_blank">github</a>
        <a href="https://x.com/rguignar" rel="me noopener" target="_blank">x</a>
      </nav>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
