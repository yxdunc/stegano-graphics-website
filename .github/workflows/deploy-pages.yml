name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repository
        uses: actions/checkout@v7

      - name: Clone steg library
        run: |
          git clone --depth 1 --branch main https://github.com/${{ github.repository_owner }}/stegano-graphics.git ../stegs

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.2.0

      - name: Build wasm package
        run: wasm-pack build ../stegs --target web --out-dir pkg

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Publish gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/stegano-pages
          mkdir -p /tmp/stegano-pages
          cp -R dist/. /tmp/stegano-pages/
          git checkout --orphan gh-pages
          git rm -rf . || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R /tmp/stegano-pages/. .
          touch .nojekyll
          git add .
          git commit -m "Deploy website"
          git push --force origin gh-pages
